version: "3.9"

services:

  # ── Signaling server ─────────────────────────────────────────────────────────
  signal:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ptt-radio-signal
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      PORT: 3001
      MAX_ROOMS: 500
      MAX_PEERS: 8
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ptt-net

  # ── Client (Nginx static file serving) ───────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ptt-radio-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      signal:
        condition: service_healthy
    networks:
      - ptt-net

networks:
  ptt-net:
    driver: bridge
