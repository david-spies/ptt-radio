server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "microphone=self"                  always;

    # Strict CSP — adjust if you add external resources
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline'; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com; "
        "connect-src 'self' wss:; "
        "media-src 'self' mediastream:; "
        "img-src 'self' data:;"
        always;

    # ── Static assets — long cache ──────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── WebSocket proxy to signaling server ─────────────────────────────────
    # Uncomment and set SIGNAL_SERVER_HOST if running signal on same host
    # location /signal {
    #     proxy_pass         http://signal:3001;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade    $http_upgrade;
    #     proxy_set_header   Connection "Upgrade";
    #     proxy_set_header   Host       $host;
    #     proxy_read_timeout 86400;
    # }

    # ── SPA catch-all — serve index.html for client-side routing ───────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
